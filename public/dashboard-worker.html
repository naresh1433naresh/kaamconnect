<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/theme.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Dashboard – KaamConnect</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .dash-layout { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .quick-actions { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 32px; }
    .quick-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px; text-align: center; cursor: pointer; transition: var(--transition); }
    .quick-card:hover { border-color: var(--border-active); transform: translateY(-2px); box-shadow: var(--shadow-glow); }
    .quick-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .quick-label { font-size: 0.9rem; font-weight: 600; }
    .profile-edit-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; }
    /* Deal Notification Popup */
    .deal-popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
    .deal-popup-overlay.open { display: flex; }
    .deal-popup { background: var(--bg-card); border: 2px solid var(--accent-green); border-radius: var(--radius-lg); padding: 28px; max-width: 400px; width: 100%; animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); text-align: center; }
    @keyframes popIn { from { opacity:0; transform:scale(0.7); } to { opacity:1; transform:scale(1); } }
    .deal-popup .deal-bell { font-size: 3rem; margin-bottom: 8px; animation: ring 0.6s ease infinite; }
    @keyframes ring { 0%,100%{transform:rotate(-15deg)} 50%{transform:rotate(15deg)} }
    .deal-popup h3 { margin-bottom: 6px; color: var(--text-primary); }
    .deal-popup .deal-amount { font-size: 2rem; font-weight: 900; color: var(--accent-green); margin: 12px 0; }
    .deal-popup .deal-meta { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 20px; }
    .deal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  </style>
</head>
<body>
  <nav class="navbar" id="main-navbar"></nav>

  <!-- Deal Notification Popup -->
  <div class="deal-popup-overlay" id="deal-popup-overlay">
    <div class="deal-popup">
      <div class="deal-bell">🔔</div>
      <h3>New Deal Offer!</h3>
      <p style="color:var(--text-muted);font-size:0.9rem" id="deal-employer">An employer wants to hire you</p>
      <div class="deal-amount" id="deal-amount">₹0</div>
      <div class="deal-meta" id="deal-meta">Category · Unit</div>
      <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:16px" id="deal-msg"></p>
      <div class="deal-btns">
        <button class="btn btn-green" onclick="respondToDeal('accepted')">✅ Accept Deal</button>
        <button class="btn btn-danger" onclick="respondToDeal('rejected')">❌ Reject</button>
      </div>
    </div>
  </div>

  <div id="page-content"><div class="spinner"></div></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/location.js"></script>
  <script>
    const user = requireAuth('worker');
    if (user) init();

    async function init() {
      injectNavbar('dashboard');
      document.getElementById('page-content').innerHTML = `
        <div class="page-header">
          <div class="page-header-inner">
            <h1>Welcome back, ${user.name.split(' ')[0]}! 👷</h1>
            <p>Manage your work, bookings, and profile</p>
          </div>
        </div>
        <div class="dash-layout">
          <!-- Stats -->
          <div class="stats-grid" id="stats-grid">
            <div class="stat-card"><div class="stat-value" id="stat-bookings">-</div><div class="stat-label">Total Bookings</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-completed">-</div><div class="stat-label">Completed Jobs</div></div>
            <div class="stat-card"><div class="stat-value">${user.rating||'New'}</div><div class="stat-label">Your Rating</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-earned">-</div><div class="stat-label">Total Earned</div></div>
          </div>

          <!-- Quick Actions -->
          <div class="quick-actions">
            <div class="quick-card" onclick="window.location.href='/browse-jobs.html'"><div class="quick-icon">🔍</div><div class="quick-label">Browse Jobs</div></div>
            <div class="quick-card" onclick="window.location.href='/my-bookings.html'"><div class="quick-icon">📋</div><div class="quick-label">My Bookings</div></div>
            <div class="quick-card" onclick="window.location.href='/worker-profile.html?id=${user._id}'"><div class="quick-icon">👤</div><div class="quick-label">View Profile</div></div>
            <div class="quick-card" onclick="toggleEditProfile()"><div class="quick-icon">✏️</div><div class="quick-label">Edit Profile</div></div>
          </div>

          <!-- Edit Profile (hidden by default) -->
          <div class="profile-edit-section" id="edit-section" style="display:none">
            <h3 style="margin-bottom:20px">Edit Profile</h3>
            <div id="edit-success" class="alert alert-success" style="display:none">Profile updated!</div>
            <form id="edit-form">
              <div class="form-row">
                <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" id="edit-name" value="${user.name}"></div>
                <div class="form-group"><label class="form-label">Phone</label><input class="form-control" id="edit-phone" value="${user.phone||''}"></div>
              </div>
               <div class="form-group">
                <label class="form-label">Location / City</label>
                <div style="display:flex; gap:8px">
                  <input class="form-control" id="edit-location" value="${user.location||''}" style="flex:1">
                  <button type="button" class="btn btn-secondary" onclick="detectWorkerLocation()" style="width:auto; padding:0 12px; font-size:0.85rem">📍 Detect</button>
                </div>
              </div>
              <div class="form-group"><label class="form-label">About Yourself</label><textarea class="form-control" id="edit-bio" rows="3">${user.bio||''}</textarea></div>
              <div class="form-group">
                <label class="form-label">Set Your Working Coordinates</label>
                <div id="worker-map" style="height: 250px; width: 100%; border-radius: var(--radius-md); border: 1px solid var(--border); z-index: 1;"></div>
                <p style="font-size:0.8rem; color:var(--text-muted); margin-top:6px;">Moving from job to job? Drop the pin where you are currently available.</p>
              </div>
              <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
              <button type="button" class="btn btn-secondary btn-sm" onclick="toggleEditProfile()" style="margin-left:8px">Cancel</button>
            </form>
          </div>

          <!-- Profile card -->
          <div class="card" style="margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
              <div class="avatar avatar-lg">${user.profilePhoto?`<img src="${user.profilePhoto}" style="width:100%;height:100%;object-fit:cover">`:avatarInitials(user.name)}</div>
              <div style="flex:1">
                <h3>${user.name}</h3>
                <div style="color:var(--text-muted);font-size:0.9rem;margin:4px 0">📍 ${user.location||'Add your location'}</div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
                  ${(user.skills||[]).slice(0,5).map(s=>`<span class="tag">${s}</span>`).join('')}
                  ${(user.skills||[]).length===0?'<span style="color:var(--text-muted);font-size:0.85rem">No skills added yet</span>':''}
                </div>
              </div>
              <div style="text-align:right">
                <div>${renderStars(Math.round(user.rating||0))}</div>
                <div style="font-size:0.85rem;color:var(--text-muted);margin-top:4px">${user.totalReviews||0} review${user.totalReviews!==1?'s':''}</div>
              </div>
            </div>
          </div>

          <!-- Recent Bookings -->
          <h3 style="margin-bottom:16px">Recent Bookings</h3>
          <div id="bookings-list"><div class="spinner"></div></div>
        </div>`;

      loadBookings();
    }

    let mapInitialized = false;
    let map = null;
    let marker = null;
    let selectedLatLng = null;

    function toggleEditProfile() {
      const s = document.getElementById('edit-section');
      if (s.style.display === 'none') {
        s.style.display = 'block';
        if (!mapInitialized) {
          setTimeout(() => {
            const initialCoords = (user.locationCoords && user.locationCoords.coordinates) || [78.9629, 20.5937]; // [lng, lat]
            const startLat = user.locationCoords ? initialCoords[1] : 20.5937;
            const startLng = user.locationCoords ? initialCoords[0] : 78.9629;
            map = L.map('worker-map').setView([startLat, startLng], user.locationCoords ? 14 : 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            marker = L.marker([startLat, startLng], {draggable: true}).addTo(map);
            
            if (user.locationCoords) {
               selectedLatLng = { lat: startLat, lng: startLng };
            } else if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(pos => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 14);
                marker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
                selectedLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
              });
            }
            
            marker.on('dragend', () => selectedLatLng = marker.getLatLng());
            map.on('click', (e) => { marker.setLatLng(e.latlng); selectedLatLng = e.latlng; });
            mapInitialized = true;
          }, 100);
        } else {
          setTimeout(() => map.invalidateSize(), 50);
        }
      } else {
        s.style.display = 'none';
      }
    }

    async function detectWorkerLocation() {
      const btn = event.target;
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const info = await LocationHelper.autoFill({
          cityInputId: 'edit-location',
          onSuccess: (coords) => {
            if (map && marker) {
              map.setView([coords.lat, coords.lng], 14);
              marker.setLatLng([coords.lat, coords.lng]);
              selectedLatLng = { lat: coords.lat, lng: coords.lng };
            }
          }
        });
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    document.addEventListener('submit', async (e) => {
      if (e.target.id === 'edit-form') {
        e.preventDefault();
        try {
          const updated = await API.updateWorkerProfile({
            name: document.getElementById('edit-name').value.trim(),
            phone: document.getElementById('edit-phone').value.trim(),
            location: document.getElementById('edit-location').value.trim(),
            bio: document.getElementById('edit-bio').value.trim(),
            lat: selectedLatLng ? selectedLatLng.lat : undefined,
            lng: selectedLatLng ? selectedLatLng.lng : undefined
          });
          const s = localStorage.getItem('kc_user') ? JSON.parse(localStorage.getItem('kc_user')) : {};
          localStorage.setItem('kc_user', JSON.stringify({...s,...updated}));
          document.getElementById('edit-success').style.display='flex';
          showToast('Profile updated!','success');
        } catch(err) { showToast(err.message,'error'); }
      }
    });

    async function loadBookings() {
      const el = document.getElementById('bookings-list');
      try {
        const bookings = await API.getMyBookings();
        // Stats
        document.getElementById('stat-bookings').textContent = bookings.length;
        const completed = bookings.filter(b=>b.status==='completed');
        document.getElementById('stat-completed').textContent = completed.length;
        const earned = completed.reduce((s,b)=>s+(b.totalAmount||0),0);
        document.getElementById('stat-earned').textContent = formatAmount(earned);

        if (!bookings.length) {
          el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><h3>No bookings yet</h3><p>Apply to jobs to get started!</p><a href="/browse-jobs.html" class="btn btn-primary" style="margin-top:16px">Browse Jobs</a></div>';
          return;
        }
        el.innerHTML = bookings.slice(0,5).map(b=>`
          <div class="booking-card" style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
              <div>
                <strong style="cursor:pointer" onclick="window.location.href='/job-detail.html?id=${b.job?._id}'">${b.job?.title||'Job'}</strong>
                <div style="font-size:0.85rem;color:var(--text-muted);margin-top:2px">${b.job?.category||''}</div>
              </div>
              <span class="badge booking-status-${b.status}">${b.status.toUpperCase()}</span>
            </div>
            <div style="display:flex;gap:20px;font-size:0.85rem;color:var(--text-muted);flex-wrap:wrap">
              <span>💰 ${formatAmount(b.job?.paymentRate||0)} ${b.job?.paymentUnit||''}</span>
              <span>📍 ${b.job?.location||''}</span>
              <span>📅 ${formatDate(b.createdAt)}</span>
              ${b.totalAmount?`<span style="color:var(--accent-green);font-weight:600">Earned: ${formatAmount(b.totalAmount)}</span>`:''}
            </div>
          </div>`).join('') + (bookings.length>5?`<a href="/my-bookings.html" class="btn btn-secondary btn-sm" style="margin-top:8px">View All ${bookings.length} Bookings</a>`:'');
      } catch(err){
        el.innerHTML=`<div class="empty-state"><p>${err.message}</p></div>`;
      }
    }

    // ─── Deal Notification Polling ───
    let activeDealBookingId = null;
    let lastSeenBookingId = localStorage.getItem('kc_last_seen_booking') || null;

    async function pollForDeals() {
      try {
        const bookings = await API.getMyBookings();
        // Find newest pending booking not seen before (could be a quick booking from employer)
        const pending = bookings.filter(b => b.status === 'pending' && b.job?.title?.includes('Quick Booking'));
        if (pending.length > 0) {
          const newest = pending[0]; // Already sorted by -createdAt
          if (newest._id !== lastSeenBookingId) {
            lastSeenBookingId = newest._id;
            localStorage.setItem('kc_last_seen_booking', newest._id);
            showDealPopup(newest);
          }
        }
      } catch(err) { /* silent */ }
    }

    function showDealPopup(booking) {
      activeDealBookingId = booking._id;
      const job = booking.job;
      document.getElementById('deal-amount').textContent = job ? `₹${job.paymentRate} ${job.paymentUnit}` : '₹?';
      document.getElementById('deal-meta').textContent = job ? `${job.category} · ${job.paymentType === 'time' ? 'Time-wise' : 'Work-wise'} · 📍 ${job.location}` : '';
      document.getElementById('deal-employer').textContent = `${booking.employer?.name || 'An employer'} wants to hire you!`;
      document.getElementById('deal-msg').textContent = booking.message || '';
      document.getElementById('deal-popup-overlay').classList.add('open');
    }

    async function respondToDeal(status) {
      if (!activeDealBookingId) return;
      try {
        await API.updateBookingStatus(activeDealBookingId, { status });
        document.getElementById('deal-popup-overlay').classList.remove('open');
        if (status === 'accepted') {
          showToast('🎉 Deal accepted! The employer has been notified.', 'success');
        } else {
          showToast('Deal rejected.', 'info');
        }
        loadBookings();
      } catch(err) { showToast(err.message, 'error'); }
    }

    // Poll every 15 seconds
    setInterval(pollForDeals, 15000);
    // Also poll immediately after init
    setTimeout(pollForDeals, 2000);
  </script>
</body>
</html>
